<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Picker</title>
  <style>
    :root {
      --bg: #060606;
      --panel: #0f0f0f;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #ff7a3d;
      --line: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, rgba(255, 122, 61, 0.08), transparent 28%), var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-rows: 1fr auto auto;
      gap: 16px;
    }

    .stage {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 24px;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    .stage::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(255, 122, 61, 0.18);
      filter: blur(40px);
      opacity: 0.5;
      animation: pulse 3s ease-in-out infinite;
    }

    .stage.drawing::after {
      animation: pulse 0.6s ease-in-out infinite;
    }

    .name {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.95;
      max-width: 100%;
      text-wrap: balance;
      word-break: break-word;
    }

    .controls {
      display: grid;
      place-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 16px 28px;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--accent);
      color: #111;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .history {
      min-height: 64px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 20px;
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      overflow-x: auto;
      white-space: nowrap;
    }

    .history span {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      flex: 0 0 auto;
    }

    .history .picked {
      color: var(--text);
      background: rgba(255, 122, 61, 0.16);
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(0.95);
        opacity: 0.35;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.75;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" id="stage">
      <div class="name" id="name">Ready</div>
    </section>

    <div class="controls">
      <button id="pickButton" type="button">Pick Student</button>
    </div>

    <section class="history" id="history">
      <span>History will appear here</span>
    </section>
  </main>

  <script>
    const students = [
  "Yuktha Hasini Rayapudi",
  "Shamitha Abeynayaka",
  "Winston Jap",
  "Shreya Garg",
  "Sandira Polketiyage",
  "Anthony Eav",
  "John Chen",
  "Maya Stosic",
  "Weixiong Li",
  "Zhouxiang Li",
  "Eugene Sulistyo",
  "Hieu Pham",
  "Yudi Wu",
  "Mevan Wilwara Arachchige",
  "Chacha Surapananonchai",
  "Arian Hoque"
];

    const stage = document.getElementById("stage");
    const nameEl = document.getElementById("name");
    const button = document.getElementById("pickButton");
    const historyEl = document.getElementById("history");

    let remaining = [...students];
    let history = [];
    let drawing = false;

    function renderHistory() {
      if (history.length === 0) {
        historyEl.innerHTML = "<span>History will appear here</span>";
        return;
      }

      historyEl.innerHTML = history
        .map((name) => `<span class="picked">${name}</span>`)
        .join("");
    }

    function resetRound() {
      remaining = [...students];
      history = [];
      nameEl.textContent = "Ready";
      button.textContent = "Pick Student";
      renderHistory();
    }

    function pickStudent() {
      if (drawing) {
        return;
      }

      if (remaining.length === 0) {
        resetRound();
        return;
      }

      drawing = true;
      button.disabled = true;
      stage.classList.add("drawing");

      const spin = setInterval(() => {
        const preview = remaining[Math.floor(Math.random() * remaining.length)];
        nameEl.textContent = preview;
      }, 90);

      setTimeout(() => {
        clearInterval(spin);

        const index = Math.floor(Math.random() * remaining.length);
        const picked = remaining.splice(index, 1)[0];

        nameEl.textContent = picked;
        history.unshift(picked);
        renderHistory();

        drawing = false;
        button.disabled = false;
        stage.classList.remove("drawing");
        button.textContent = remaining.length === 0 ? "Reset" : "Pick Student";
      }, 1400);
    }

    button.addEventListener("click", pickStudent);
    renderHistory();
  </script>
</body>
</html>
